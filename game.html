<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake Game</title>
  <style>
    :root{
      --bg:#0b1020;
      --panel: rgba(255,255,255,.06);
      --text:#e8eefc;
      --muted: rgba(232,238,252,.7);
      --grid:#152042;
      --snake:#33d17a;
      --snake2:#1aa85a;
      --food:#ff3b5c;
      --danger:#ff5b5b;
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background: radial-gradient(1200px 800px at 50% 20%, rgba(70,120,255,.22), transparent 55%), var(--bg);
      color:var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
    }

    .wrap{
      width:min(720px, 96vw);
      display:grid;
      grid-template-columns: 1fr;
      gap:12px;
    }

    .topbar{
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:space-between;
      padding:12px 14px;
      background: var(--panel);
      border: 1px solid rgba(255,255,255,.08);
      border-radius:14px;
    }

    .stats{
      display:flex;
      gap:14px;
      flex-wrap:wrap;
      align-items:baseline;
    }

    .stat{
      display:flex;
      flex-direction:column;
      gap:4px;
      min-width:92px;
    }

    .stat .label{ font-size:12px; color:var(--muted); }
    .stat .value{ font-size:18px; font-weight:700; letter-spacing:.2px; }

    .hint{
      font-size:12.5px;
      color:var(--muted);
      text-align:right;
      line-height:1.25;
    }

    .board{
      position:relative;
      background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
      border: 1px solid rgba(255,255,255,.10);
      border-radius:16px;
      overflow:hidden;
      box-shadow: 0 18px 50px rgba(0,0,0,.35);
    }

    canvas{ display:block; width:100%; height:auto; }

    .overlay{
      position:absolute;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      background: rgba(0,0,0,.45);
    }

    .overlay.show{ display:flex; }

    .card{
      width:min(420px, 96%);
      padding:16px 16px 14px;
      border-radius:16px;
      background: rgba(10,15,30,.85);
      border: 1px solid rgba(255,255,255,.12);
      backdrop-filter: blur(8px);
    }

    .card h2{
      margin:0 0 8px;
      font-size:18px;
    }

    .card p{ margin:0; color:var(--muted); font-size:13px; line-height:1.4; }

    .actions{
      display:flex;
      gap:10px;
      margin-top:14px;
      flex-wrap:wrap;
    }

    button{
      appearance:none;
      border:0;
      padding:10px 12px;
      border-radius:12px;
      cursor:pointer;
      color:var(--text);
      font-weight:700;
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.14);
      transition: transform .06s ease, background .15s ease;
    }

    button:hover{ background: rgba(255,255,255,.16); }
    button:active{ transform: translateY(1px); }

    button.primary{
      background: linear-gradient(180deg, rgba(51,209,122,.35), rgba(26,168,90,.25));
      border-color: rgba(51,209,122,.42);
    }

    .smallkey{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size:12px;
      padding:2px 6px;
      border-radius:8px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.10);
      color: rgba(232,238,252,.9);
      display:inline-block;
      margin:0 2px;
    }

    .footer{
      text-align:center;
      color: rgba(232,238,252,.6);
      font-size:12px;
    }

    @media (max-width: 520px){
      .topbar{ align-items:flex-start; flex-direction:column; }
      .hint{ text-align:left; }
      .stats{ width:100%; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="stats">
        <div class="stat">
          <div class="label">Score</div>
          <div class="value" id="score">0</div>
        </div>
        <div class="stat">
          <div class="label">High Score</div>
          <div class="value" id="high">0</div>
        </div>
        <div class="stat">
          <div class="label">Speed</div>
          <div class="value" id="speed">1×</div>
        </div>
      </div>
      <div class="hint">
        Move: <span class="smallkey">Arrow</span> / <span class="smallkey">WASD</span><br/>
        Pause: <span class="smallkey">P</span> &nbsp;·&nbsp; Restart: <span class="smallkey">R</span>
      </div>
    </div>

    <div class="board">
      <canvas id="game" width="640" height="640" aria-label="Snake game" role="img"></canvas>
      <div class="overlay show" id="overlay">
        <div class="card">
          <h2>Snake</h2>
          <p>
            Eat the food, grow longer, and don’t hit the walls or yourself.
          </p>
          <div class="actions">
            <button class="primary" id="startBtn">Start</button>
            <button id="howBtn" type="button">Controls</button>
          </div>
          <p id="howText" style="margin-top:10px; display:none;">
            Use <b>Arrow Keys</b> or <b>WASD</b> to move. You can’t reverse direction directly.
            Press <b>P</b> to pause and <b>R</b> to restart.
          </p>
        </div>
      </div>
    </div>

    <div class="footer">Built with HTML + CSS + JavaScript (Canvas)</div>
  </div>

  <script>
    (() => {
      const canvas = document.getElementById('game');
      const ctx = canvas.getContext('2d');

      const scoreEl = document.getElementById('score');
      const highEl = document.getElementById('high');
      const speedEl = document.getElementById('speed');

      const overlay = document.getElementById('overlay');
      const startBtn = document.getElementById('startBtn');
      const howBtn = document.getElementById('howBtn');
      const howText = document.getElementById('howText');

      // Grid settings
      const GRID = 20;              // 20x20
      const CELL = canvas.width / GRID;

      const DIRS = {
        up:    {x: 0, y:-1},
        down:  {x: 0, y: 1},
        left:  {x:-1, y: 0},
        right: {x: 1, y: 0},
      };

      const STORAGE_KEY = 'snake_high_score_v1';
      let highScore = Number(localStorage.getItem(STORAGE_KEY) || '0');
      highEl.textContent = String(highScore);

      // State
      let snake, dir, nextDir, food, score;
      let running = false;
      let paused = false;
      let lastTime = 0;
      let acc = 0;
      let stepMs = 140; // base speed

      function randInt(min, max){
        return Math.floor(Math.random() * (max - min + 1)) + min;
      }

      function equal(a,b){ return a.x === b.x && a.y === b.y; }

      function reset(){
        score = 0;
        scoreEl.textContent = '0';

        const startX = Math.floor(GRID/2);
        const startY = Math.floor(GRID/2);

        // Initial snake length 4
        snake = [
          {x: startX, y: startY},
          {x: startX-1, y: startY},
          {x: startX-2, y: startY},
          {x: startX-3, y: startY},
        ];

        dir = DIRS.right;
        nextDir = dir;

        stepMs = 140;
        updateSpeedUI();

        food = spawnFood();

        running = true;
        paused = false;
        overlay.classList.remove('show');

        lastTime = 0;
        acc = 0;
        requestAnimationFrame(loop);
        draw();
      }

      function updateSpeedUI(){
        // Map stepMs to a multiplier roughly
        const mult = Math.max(1, (140 / stepMs));
        speedEl.textContent = `${mult.toFixed(mult < 2 ? 1 : 0)}×`;
      }

      function spawnFood(){
        // Avoid spawning on snake
        const occupied = new Set(snake.map(p => `${p.x},${p.y}`));
        // Try random cells; fallback to scan
        for(let i=0;i<5000;i++){
          const x = randInt(0, GRID-1);
          const y = randInt(0, GRID-1);
          if(!occupied.has(`${x},${y}`)) return {x,y};
        }
        for(let y=0;y<GRID;y++){
          for(let x=0;x<GRID;x++){
            if(!occupied.has(`${x},${y}`)) return {x,y};
          }
        }
        return {x:0,y:0};
      }

      function isCollision(head){
        // Wall collision
        if(head.x < 0 || head.y < 0 || head.x >= GRID || head.y >= GRID) return true;
        // Self collision (head can overlap tail only after it moves away)
        // When checking after movement, we compare against entire current snake.
        // We'll handle with index logic in step().
        return false;
      }

      function step(){
        // Apply next direction but prevent direct reversal
        const nd = nextDir;
        if(!(nd.x === -dir.x && nd.y === -dir.y)){
          dir = nd;
        }

        const newHead = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

        if(isCollision(newHead)){
          return gameOver();
        }

        // Check self collision: compare newHead with all snake segments
        // Tail will move away only if we don't eat.
        const willEat = equal(newHead, food);
        const bodyToCheck = willEat ? snake : snake.slice(0, -1);
        if(bodyToCheck.some(p => equal(p, newHead))){
          return gameOver();
        }

        snake.unshift(newHead);

        if(willEat){
          score += 10;
          scoreEl.textContent = String(score);

          if(score > highScore){
            highScore = score;
            highEl.textContent = String(highScore);
            localStorage.setItem(STORAGE_KEY, String(highScore));
          }

          // Speed up gradually
          // Every 50 points, reduce stepMs a bit (min 65ms)
          const target = 140 - Math.floor(score / 50) * 8;
          stepMs = Math.max(65, target);
          updateSpeedUI();

          food = spawnFood();
        } else {
          snake.pop();
        }
      }

      function gameOver(){
        running = false;
        paused = false;
        overlay.querySelector('h2').textContent = 'Game Over';
        overlay.querySelector('.card p').innerHTML = `Final score: <b>${score}</b>. Press <b>Start</b> to play again.`;
        overlay.classList.add('show');
      }

      function togglePause(){
        if(!running) return;
        paused = !paused;
        overlay.classList.toggle('show', paused);
        if(paused){
          overlay.querySelector('h2').textContent = 'Paused';
          overlay.querySelector('.card p').innerHTML = `Press <b>P</b> to resume.`;
          startBtn.textContent = 'Resume';
        } else {
          overlay.classList.remove('show');
          startBtn.textContent = 'Start';
          // Reset timing so we don't jump
          lastTime = 0;
          acc = 0;
          requestAnimationFrame(loop);
        }
      }

      function drawCell(x,y,fill){
        const px = x*CELL;
        const py = y*CELL;
        ctx.fillStyle = fill;
        ctx.fillRect(px+1, py+1, CELL-2, CELL-2);
      }

      function draw(){
        // Background
        ctx.clearRect(0,0,canvas.width,canvas.height);

        // Grid (subtle)
        ctx.fillStyle = 'rgba(21,32,66,.35)';
        for(let y=0;y<GRID;y++){
          for(let x=0;x<GRID;x++){
            if((x+y)%2===0){
              ctx.fillRect(x*CELL, y*CELL, CELL, CELL);
            }
          }
        }

        // Food
        const fx = food.x, fy = food.y;
        const cx = fx*CELL, cy = fy*CELL;
        const r = CELL*0.36;
        ctx.save();
        ctx.translate(cx + CELL/2, cy + CELL/2);
        const grad = ctx.createRadialGradient(0,0, r*0.2, 0,0, r);
        grad.addColorStop(0, 'rgba(255,59,92,1)');
        grad.addColorStop(1, 'rgba(255,59,92,.25)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(0,0, r, 0, Math.PI*2);
        ctx.fill();
        ctx.restore();

        // Snake
        for(let i=0;i<snake.length;i++){
          const p = snake[i];
          const isHead = i===0;
          const base = isHead ? 'rgba(51,209,122,1)' : 'rgba(26,168,90,.95)';

          drawCell(p.x,p.y, base);

          // Head eyes
          if(isHead){
            ctx.save();
            const px = p.x*CELL;
            const py = p.y*CELL;
            const ex = px + CELL/2;
            const ey = py + CELL/2;

            const eyeOffsetX = dir.x * CELL*0.18;
            const eyeOffsetY = dir.y * CELL*0.18;

            const perpX = -dir.y;
            const perpY = dir.x;

            const eye1x = ex + perpX*CELL*0.12 + eyeOffsetX;
            const eye1y = ey + perpY*CELL*0.12 + eyeOffsetY;
            const eye2x = ex - perpX*CELL*0.12 + eyeOffsetX;
            const eye2y = ey - perpY*CELL*0.12 + eyeOffsetY;

            ctx.fillStyle = 'rgba(0,0,0,.55)';
            ctx.beginPath(); ctx.arc(eye1x, eye1y, CELL*0.06, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(eye2x, eye2y, CELL*0.06, 0, Math.PI*2); ctx.fill();

            // little highlight
            ctx.fillStyle = 'rgba(255,255,255,.10)';
            ctx.fillRect(px+6, py+6, CELL-12, CELL-12);

            ctx.restore();
          }
        }

        // Border highlight
        ctx.strokeStyle = 'rgba(255,255,255,.10)';
        ctx.lineWidth = 2;
        ctx.strokeRect(1,1,canvas.width-2,canvas.height-2);
      }

      function loop(ts){
        if(!running) return;
        if(paused) return;
        if(!lastTime) lastTime = ts;

        const delta = ts - lastTime;
        lastTime = ts;
        acc += delta;

        while(acc >= stepMs){
          acc -= stepMs;
          step();
          if(!running) break;
        }

        draw();
        if(running) requestAnimationFrame(loop);
      }

      function setDirectionFromKey(key){
        const k = key.toLowerCase();
        const map = {
          'arrowup': 'up',
          'w': 'up',
          'arrowdown': 'down',
          's': 'down',
          'arrowleft': 'left',
          'a': 'left',
          'arrowright': 'right',
          'd': 'right',
        };
        if(!map[k]) return;
        const nd = DIRS[map[k]];
        // Prevent direct reversal
        if(!(nd.x === -dir.x && nd.y === -dir.y)) nextDir = nd;
      }

      // UI
      startBtn.addEventListener('click', () => {
        if(!running || overlay.classList.contains('show')) {
          // Start or resume
          if(paused){
            paused = false;
            overlay.classList.remove('show');
            startBtn.textContent = 'Start';
            lastTime = 0;
            acc = 0;
            requestAnimationFrame(loop);
            return;
          }
          reset();
        }
      });

      howBtn.addEventListener('click', () => {
        const isShown = howText.style.display !== 'none';
        howText.style.display = isShown ? 'none' : 'block';
      });

      document.addEventListener('keydown', (e) => {
        const key = e.key;

        if(key === 'p' || key === 'P'){
          e.preventDefault();
          togglePause();
          return;
        }
        if(key === 'r' || key === 'R'){
          e.preventDefault();
          reset();
          return;
        }

        if(!running){
          // Allow starting immediately with movement keys
          if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','w','a','s','d','W','A','S','D'].includes(e.key)){
            reset();
          }
        }

        setDirectionFromKey(key);
      });

      // Initial render
      draw();

    })();
  </script>
</body>
</html>
